<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cryptocurrency Functions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        input {
            padding: 8px;
            width: 100%;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .result {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🧪 Cryptocurrency Function Tests</h1>

    <div class="test-section">
        <h2>1. Create Wallet</h2>
        <button onclick="testCreateWallet()">Create Wallet</button>
        <div id="walletResult" class="result"></div>
        <div id="walletsList"></div>
    </div>

    <div class="test-section">
        <h2>2. Check Balance</h2>
        <input type="text" id="balanceAddress" placeholder="Enter address">
        <button onclick="testCheckBalance()">Check Balance</button>
        <div id="balanceResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. Mine Block</h2>
        <select id="minerWalletId">
            <option value="">Select wallet...</option>
        </select>
        <button onclick="testMineBlock()">Mine Block</button>
        <div id="mineResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. Send Transaction</h2>
        <label>From Wallet:</label>
        <select id="fromWalletId">
            <option value="">Select wallet...</option>
        </select>
        <label>To Address:</label>
        <input type="text" id="toAddress" placeholder="Recipient address">
        <label>Amount:</label>
        <input type="number" id="amount" placeholder="Amount" step="0.1">
        <label>Fee:</label>
        <input type="number" id="fee" placeholder="Fee" value="0.5" step="0.1">
        <button onclick="testSendTransaction()">Send Transaction</button>
        <div id="txResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>5. View Blockchain</h2>
        <button onclick="testViewBlockchain()">View Blockchain Info</button>
        <button onclick="testViewBlocks()">View Recent Blocks</button>
        <div id="blockchainResult" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let testWallets = [];

        async function apiCall(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                };
                if (body) options.body = JSON.stringify(body);

                const response = await fetch(`${API_URL}${endpoint}`, options);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'API request failed');
                }
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        async function testCreateWallet() {
            const result = document.getElementById('walletResult');
            result.textContent = 'Creating wallet...';

            try {
                const wallet = await apiCall('/wallet/create', 'POST');
                testWallets.push(wallet);

                result.className = 'result success';
                result.textContent = JSON.stringify(wallet, null, 2);

                updateWalletSelects();
                displayTestWallets();
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
            }
        }

        function displayTestWallets() {
            const list = document.getElementById('walletsList');
            if (testWallets.length === 0) return;

            list.innerHTML = '<h3>Created Wallets:</h3>' + testWallets.map((w, i) => `
                <div style="background: #f0f0f0; padding: 10px; margin: 5px 0; border-radius: 5px;">
                    <strong>Wallet ${i + 1} (ID: ${w.wallet_id})</strong><br>
                    Address: ${w.address}<br>
                    Balance: ${w.balance} coins
                </div>
            `).join('');
        }

        function updateWalletSelects() {
            const fromSelect = document.getElementById('fromWalletId');
            const minerSelect = document.getElementById('minerWalletId');

            const options = testWallets.map(w =>
                `<option value="${w.wallet_id}">Wallet ${w.wallet_id} - ${w.address.substring(0, 20)}...</option>`
            ).join('');

            fromSelect.innerHTML = '<option value="">Select wallet...</option>' + options;
            minerSelect.innerHTML = '<option value="">Select wallet...</option>' + options;
        }

        async function testCheckBalance() {
            const address = document.getElementById('balanceAddress').value.trim();
            const result = document.getElementById('balanceResult');

            if (!address) {
                result.className = 'result error';
                result.textContent = 'Please enter an address';
                return;
            }

            result.textContent = 'Checking balance...';

            try {
                const data = await apiCall(`/balance/${address}`);
                result.className = 'result success';
                result.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
            }
        }

        async function testMineBlock() {
            const walletId = document.getElementById('minerWalletId').value;
            const result = document.getElementById('mineResult');

            if (!walletId) {
                result.className = 'result error';
                result.textContent = 'Please select a miner wallet';
                return;
            }

            const wallet = testWallets.find(w => w.wallet_id == walletId);
            if (!wallet) {
                result.className = 'result error';
                result.textContent = 'Wallet not found';
                return;
            }

            result.textContent = 'Mining... Please wait...';

            try {
                const data = await apiCall('/mine', 'POST', {
                    miner_address: wallet.address
                });
                result.className = 'result success';
                result.textContent = 'Block Mined!\n' + JSON.stringify(data, null, 2);

                // Refresh wallet balances
                await refreshTestWallets();
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
            }
        }

        async function testSendTransaction() {
            const walletId = document.getElementById('fromWalletId').value;
            const toAddress = document.getElementById('toAddress').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const fee = parseFloat(document.getElementById('fee').value);
            const result = document.getElementById('txResult');

            if (!walletId || !toAddress || !amount || !fee) {
                result.className = 'result error';
                result.textContent = 'Please fill all fields';
                return;
            }

            result.textContent = 'Sending transaction...';

            try {
                const data = await apiCall('/transaction/create', 'POST', {
                    wallet_id: parseInt(walletId),
                    to_address: toAddress,
                    amount: amount,
                    fee: fee
                });
                result.className = 'result success';
                result.textContent = 'Transaction Sent!\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
            }
        }

        async function testViewBlockchain() {
            const result = document.getElementById('blockchainResult');
            result.textContent = 'Loading...';

            try {
                const data = await apiCall('/blockchain/info');
                result.className = 'result success';
                result.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
            }
        }

        async function testViewBlocks() {
            const result = document.getElementById('blockchainResult');
            result.textContent = 'Loading...';

            try {
                const data = await apiCall('/blocks?limit=5');
                result.className = 'result success';
                result.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
            }
        }

        async function refreshTestWallets() {
            for (let wallet of testWallets) {
                try {
                    const updated = await apiCall(`/wallet/${wallet.wallet_id}`);
                    wallet.balance = updated.balance;
                } catch (error) {
                    console.error('Failed to update wallet:', error);
                }
            }
            displayTestWallets();
        }

        // Test connection on load
        window.addEventListener('load', async () => {
            try {
                await apiCall('/blockchain/info');
                console.log('✅ API connection successful');
            } catch (error) {
                console.error('❌ API connection failed:', error);
                alert('Cannot connect to API. Make sure the server is running on http://localhost:5000');
            }
        });
    </script>
</body>
</html>
